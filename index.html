/* ============================================================
   CONFIG — read from config.js (window.LEDGER_CONFIG).
   You should never need to edit this file's settings; edit config.js.

const CFG = (typeof window !== "undefined" && window.LEDGER_CONFIG) || {};
const SUPABASE_URL = CFG.supabaseUrl || "";
const SUPABASE_ANON_KEY = CFG.supabaseKey || "";
const SUPABASE_TABLE = CFG.table || "ledger";

// Household ID: from ?home= in the URL, else config default, else a safe fallback.
// This lets one deployed app serve many separate households later — each gets
// its own link like  .../index.html?home=SOME-ID  and its own private data row.
function resolveHouseholdId() {
  try {
    const u = new URL(window.location.href);
    const fromUrl = u.searchParams.get("home");
    if (fromUrl) return fromUrl.trim().toLowerCase();
  } catch {}
  return (CFG.defaultHousehold || "default-home").trim().toLowerCase();
}
const HOUSEHOLD_ID = resolveHouseholdId();
const LOCAL_KEY = "household-ledger-cache:" + HOUSEHOLD_ID;

const sb = (SUPABASE_URL.startsWith("http") && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

/* Local cache so the app still works offline / before setup */
function loadLocal() {
  try { const r = localStorage.getItem(LOCAL_KEY); return r ? migrate(JSON.parse(r)) : null; }
  catch { return null; }
}
function saveLocal(d) {
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(d)); } catch {}
}

/* Ensure older saved data has all newer fields */
function migrate(d) {
  const base = JSON.parse(JSON.stringify(DEFAULT_DATA));
  const out = { ...base, ...d };
  out.assets = (d.assets || base.assets).map((a) => ({ liquid: false, growthRate: DEFAULT_ASSET_GROWTH, ...a }));
  out.liabilities = (d.liabilities || base.liabilities).map((x) => ({ rate: 0, payment: 0, ...x }));
  out.income = d.income || base.income;
  out.expenses = d.expenses || base.expenses;
  out.history = d.history || [];
  out.goals = (d.goals || base.goals).map((g, i) => ({
    isEmergencyFund: false, expenseMonths: 3, priority: i, splitWeight: 100,
    linkedAssets: [], saved: 0, target: 0, ...g,
  }));
  out.assumptions = { ...base.assumptions, ...(d.assumptions || {}) };
  out.scenarios = d.scenarios || [];
  return out;
}

/* Inline icon component (replaces lucide-react). Paths separated by "|". */
function Ic({ d, size = 16 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      style={{ flexShrink: 0, verticalAlign: "middle" }}>
      {String(d).split("|").map((seg, i) => <path key={i} d={seg} />)}
    </svg>
  );
}




// ---- Storage helpers (shared so both partners see the same data) ----


const DEFAULT_DATA = {
  assets: [
    { id: "a1", name: "Checking", value: 12000, liquid: true, growthRate: 0 },
    { id: "a2", name: "Savings", value: 38000, liquid: true, growthRate: 4 },
    { id: "a3", name: "401(k) / Retirement", value: 145000, liquid: false, growthRate: 7 },
    { id: "a4", name: "Home equity", value: 210000, liquid: false, growthRate: 3 },
  ],
  liabilities: [
    { id: "l1", name: "Mortgage", value: 320000, rate: 6.5, payment: 2400 },
    { id: "l2", name: "Car loan", value: 14000, rate: 5, payment: 450 },
  ],
  income: [
    { id: "i1", name: "Salary — primary", value: 8500 },
    { id: "i2", name: "Salary — partner", value: 6200 },
  ],
  expenses: [
    { id: "e1", name: "Mortgage + utilities", value: 3100 },
    { id: "e2", name: "Childcare", value: 1400 },
    { id: "e3", name: "Food + household", value: 1500 },
    { id: "e4", name: "Everything else", value: 2200 },
  ],
  goals: [
    { id: "g1", name: "Emergency fund", target: 50000, saved: 38000, linkedAssets: [], isEmergencyFund: true, expenseMonths: 3, priority: 0, splitWeight: 100 },
    { id: "g2", name: "Family trip", target: 8000, saved: 2400, linkedAssets: [], isEmergencyFund: false, expenseMonths: 3, priority: 1, splitWeight: 100 },
  ],
  history: [],
  assumptions: {
    horizonYears: 20,        // how far the projection looks ahead
    incomeGrowth: 3,         // annual % raise applied to income
    expenseGrowth: 3,        // annual % inflation applied to expenses
    overflowAssetId: null,   // where leftover surplus goes (defaults to highest-growth)
  },
  scenarios: [],             // Pass 2 will populate this
};

// Default growth rate to assume for an asset that has none set
const DEFAULT_ASSET_GROWTH = 4;

const fmt = (n) =>
  n.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });

const sum = (arr) => arr.reduce((t, x) => t + (Number(x.value) || 0), 0);

// Short month label from a Date
const monthLabel = (d) => d.toLocaleDateString("en-US", { month: "short", year: "2-digit" });
const fmtSigned = (n) => (n >= 0 ? "+" : "") + fmt(n);

// Derive a home event's mortgage amount and monthly payment from its inputs.
// amount = home value − down payment; payment = amortized over termYears at rate.
function deriveMortgage(ev) {
  const homeValue = Number(ev.newAssetValue) || 0;
  const down = Number(ev.downPayment) || 0;
  const amount = Math.max(0, homeValue - down);
  const term = Number(ev.termYears) || 30;
  const rate = Number(ev.mortgageRate) || 0;
  const nMonths = term * 12;
  let payment = 0;
  if (amount > 0 && nMonths > 0) {
    const im = rate / 100 / 12;
    payment = im > 0 ? (amount * im) / (1 - Math.pow(1 + im, -nMonths)) : amount / nMonths;
  }
  return { amount, payment, term };
}

/* ============================================================
   PROJECTION ENGINE
   Walks forward month-by-month from today. Pure function so it
   can be reused by both the Projection tab and (Pass 2) Scenarios.

   events: optional array applied during the walk. Each event:
     { type, startMonth, endMonth?, ... }  where *Month is an
     integer offset from now (0 = this month). Supported in Pass 2.
   Returns { series:[{date,label,netWorth,assets,liabilities,surplus}],
             milestones:[{label,monthIndex,date}] }
   ============================================================ */
function runProjection(data, opts = {}) {
  const a = data.assumptions || {};
  const horizonYears = opts.horizonYears || a.horizonYears || 20;
  const months = Math.round(horizonYears * 12);
  const incomeGrowthM = Math.pow(1 + (a.incomeGrowth || 0) / 100, 1 / 12);
  const expenseGrowthM = Math.pow(1 + (a.expenseGrowth || 0) / 100, 1 / 12);
  const events = opts.events || [];

  // Asset working copies. Each tracks starting value, plus cumulative
  // contributions and growth so the endpoint can be decomposed.
  let assets = (data.assets || []).map((x) => ({
    id: x.id, name: x.name, liquid: !!x.liquid,
    value: Number(x.value) || 0,
    start: Number(x.value) || 0,
    contrib: 0, growth: 0,
    rate: x.growthRate != null ? x.growthRate : DEFAULT_ASSET_GROWTH,
    growthM: Math.pow(1 + (x.growthRate != null ? x.growthRate : DEFAULT_ASSET_GROWTH) / 100, 1 / 12),
  }));
  const assetById = (id) => assets.find((x) => x.id === id);
  // Overflow destination: explicit choice, else highest-growth asset.
  const overflowId = a.overflowAssetId && assetById(a.overflowAssetId)
    ? a.overflowAssetId
    : (assets.slice().sort((p, q) => q.rate - p.rate)[0] || {}).id;
  const firstLiquid = () => assets.find((x) => x.liquid) || assets[0];

  let liabilities = (data.liabilities || []).map((x) => {
    const value = Number(x.value) || 0;
    const rate = Number(x.rate) || 0;
    let payment = Number(x.payment) || 0;
    const mr = Number(x.monthsRemaining) || 0;
    if (mr > 0 && value > 0) {
      const i = rate / 100 / 12;
      payment = i > 0 ? (value * i) / (1 - Math.pow(1 + i, -mr)) : value / mr;
    }
    return { ...x, value, rate, payment };
  });

  let income = sum(data.income || []);
  let expenses = sum(data.expenses || []);

  // Goal working state. Goals fill from surplus in priority order.
  // - emergency fund target tracks inflated expenses each month
  // - cash goals get consumed (removed from net worth) on completion
  const goalState = (data.goals || []).map((g) => ({
    id: g.id, name: g.name,
    isEmergencyFund: !!g.isEmergencyFund,
    expenseMonths: g.expenseMonths || 3,
    fixedTarget: Number(g.target) || 0,
    priority: g.priority != null ? g.priority : 99,
    splitWeight: g.splitWeight || 100,
    linkedAssets: g.linkedAssets || [],
    saved: 0,            // amount accumulated toward this goal so far
    completed: false,    // for one-time cash goals
    fundedMonth: null,   // month index when first fully funded (for goal-delay analysis)
  }));

  // Which asset does a goal's money live in? First linked asset, else first liquid.
  const goalAsset = (g) => {
    for (const aid of g.linkedAssets) { const x = assetById(aid); if (x) return x; }
    return firstLiquid();
  };
  // Seed each goal's starting progress by cascading the current liquid pool
  // through goals in priority order (matches the Goals tab pool model, and
  // avoids double-counting when several goals share one account).
  const targetForSeed = (g) => g.isEmergencyFund ? g.expenseMonths * expenses : g.fixedTarget;
  {
    let pool = assets.filter((x) => x.liquid).reduce((t, x) => t + x.value, 0);
    const ordered = goalState.slice().sort((p, q) => p.priority - q.priority);
    for (const g of ordered) {
      if (pool <= 0) { g.saved = 0; continue; }
      const tgt = targetForSeed(g);
      const fill = Math.min(pool, tgt);
      g.saved = fill;
      pool -= fill;
      // a cash goal already fully covered by existing savings counts as
      // pre-completed (its money is effectively already set aside)
      if (!g.isEmergencyFund && fill >= tgt - 0.5) { g.completed = true; g.fundedMonth = 0; }
      if (g.isEmergencyFund && fill >= tgt - 0.5) g.fundedMonth = 0;
    }
  }

  const startDate = new Date(); startDate.setDate(1);
  const series = [];
  const milestones = [];
  const noteMilestone = (label, i) => {
    if (milestones.find((m) => m.label === label)) return;
    const d = new Date(startDate); d.setMonth(d.getMonth() + i);
    milestones.push({ label, monthIndex: i, date: new Date(d) });
  };

  const targetFor = (g) => g.isEmergencyFund ? g.expenseMonths * (expenses + recurringExpenseAdj(currentMonth)) : g.fixedTarget;

  // Recurring deltas are RECOMPUTED each month from the events list (never
  // mutate the carried-forward base). Returns the income/expense adjustment
  // that applies in month i.
  const recurringIncomeAdj = (i) => {
    let d = 0;
    for (const ev of events) {
      if (ev.type === "income") {
        const active = i >= (ev.startMonth || 0) && (ev.endMonth == null || i <= ev.endMonth);
        if (active) d += ev.monthlyDelta || 0;
      }
      if (ev.type === "child") {
        const leaveActive = i >= (ev.startMonth || 0) && (ev.leaveEndMonth == null || i <= ev.leaveEndMonth);
        if (leaveActive) d += ev.leaveIncomeDelta || 0;
      }
    }
    return d;
  };
  const recurringExpenseAdj = (i) => {
    let d = 0;
    for (const ev of events) {
      if (ev.type === "expense") {
        const active = i >= (ev.startMonth || 0) && (ev.endMonth == null || i <= ev.endMonth);
        if (active) d += ev.monthlyDelta || 0;
      }
      if (ev.type === "child" && i >= (ev.startMonth || 0)) d += ev.monthlyExpense || 0;
      if (ev.type === "home" && i >= (ev.startMonth || 0)) d += ev.housingCostDelta || 0;
    }
    return d;
  };
  let currentMonth = 0;

  // One-time / structural effects fire exactly once, on the month they start.
  const applyStructuralEvents = (i) => {
    for (const ev of events) {
      const justStarted = i === (ev.startMonth || 0);
      if (!justStarted) continue;
      if (ev.type === "child" && ev.oneTimeCost) { const l = firstLiquid(); if (l) l.value = Math.max(0, l.value - ev.oneTimeCost); }
      if (ev.type === "onetime") { const l = firstLiquid(); if (l) l.value += ev.amount || 0; }
      if (ev.type === "home") {
        const l = firstLiquid();
        if (l) l.value = Math.max(0, l.value - (ev.downPayment || 0) - (ev.closingCosts || 0));
        const m = deriveMortgage(ev);
        liabilities.push({ id: "ev-" + (ev.id || i), name: ev.label || "New mortgage", value: m.amount, rate: ev.mortgageRate || 0, payment: m.payment });
        if (ev.newAssetValue) assets.push({ id: "evh-" + (ev.id || i), name: (ev.label || "New home") + " equity", liquid: false, value: ev.newAssetValue, start: 0, contrib: ev.newAssetValue, growth: 0, rate: ev.appreciation || 3, growthM: Math.pow(1 + (ev.appreciation || 3) / 100, 1 / 12) });
      }
    }
  };

  // Add money to a specific asset, tracked as a contribution
  const contributeTo = (assetObj, amt) => { if (assetObj && amt) { assetObj.value += amt; assetObj.contrib += amt; } };

  // Emergency-fund goal and the asset that holds its money (for breakdown clarity)
  const efGoalState = goalState.find((g) => g.isEmergencyFund) || null;
  const efHolderId = efGoalState ? (goalAsset(efGoalState) || {}).id : null;

  for (let i = 0; i <= months; i++) {
    currentMonth = i;
    // structural events that change the books happen at the start of their month
    applyStructuralEvents(i);

    // effective income/expenses this month = drifting base + recomputed event deltas
    const effIncome = income + recurringIncomeAdj(i);
    const effExpenses = expenses + recurringExpenseAdj(i);

    const totA = assets.reduce((t, x) => t + x.value, 0);
    const totL = liabilities.reduce((t, x) => t + x.value, 0);
    const surplus = effIncome - effExpenses;
    const d = new Date(startDate); d.setMonth(d.getMonth() + i);
    const efBalance = efGoalState ? Math.max(0, efGoalState.saved) : 0;
    series.push({
      date: new Date(d), label: monthLabel(d),
      netWorth: totA - totL, assets: totA, liabilities: totL, surplus,
      efBalance, efHolderId,
      byAsset: assets.map((x) => ({ id: x.id, name: x.name, value: x.value })),
    });

    if (totL <= 0 && liabilities.length > 0) noteMilestone("All debt paid off", i);
    liabilities.forEach((l) => { if (l.value <= 0.5) noteMilestone(`${l.name} paid off`, i); });

    if (i === months) break;

    // grow assets (track growth portion)
    assets.forEach((x) => { const g = x.value * (x.growthM - 1); x.value += g; x.growth += g; });

    // amortize liabilities
    liabilities.forEach((l) => {
      if (l.value <= 0) { l.value = 0; return; }
      const interest = l.value * (l.rate / 100 / 12);
      l.value = Math.max(0, l.value + interest - l.payment);
    });

    // ---- route surplus through the goals waterfall ----
    let pool = effIncome - effExpenses;
    if (pool > 0) {
      // sort goals by priority, group ties into tiers (split by weight)
      const live = goalState.filter((g) => !g.completed).sort((p, q) => p.priority - q.priority);
      const tiers = [];
      live.forEach((g) => {
        const last = tiers[tiers.length - 1];
        if (last && last.priority === g.priority) last.goals.push(g);
        else tiers.push({ priority: g.priority, goals: [g] });
      });

      for (const tier of tiers) {
        if (pool <= 0) break;
        // each goal's remaining need
        const needs = tier.goals.map((g) => ({ g, need: Math.max(0, targetFor(g) - g.saved) })).filter((x) => x.need > 0);
        if (needs.length === 0) continue;
        const tierWeight = needs.reduce((t, x) => t + (x.g.splitWeight || 100), 0);
        const tierBudget = Math.min(pool, needs.reduce((t, x) => t + x.need, 0));
        let used = 0;
        needs.forEach(({ g, need }) => {
          const share = (g.splitWeight || 100) / tierWeight;
          const give = Math.min(need, tierBudget * share);
          g.saved += give;
          contributeTo(goalAsset(g), give);
          used += give;
          // cash goal completion → consume the money (remove from net worth)
          if (!g.isEmergencyFund && g.saved >= targetFor(g) - 0.5) {
            g.completed = true;
            if (g.fundedMonth == null) g.fundedMonth = i + 1;
            const ga = goalAsset(g);
            if (ga) { ga.value = Math.max(0, ga.value - g.saved); ga.contrib -= g.saved; }
            noteMilestone(`${g.name} funded & spent`, i + 1);
          }
          // emergency fund: record the first month it reaches its (current) target
          if (g.isEmergencyFund && g.fundedMonth == null && g.saved >= targetFor(g) - 0.5) {
            g.fundedMonth = i + 1;
          }
        });
        pool -= used;
      }

      // overflow: everything left after goals → chosen destination asset
      if (pool > 0) contributeTo(assetById(overflowId), pool);
    } else if (pool < 0) {
      // shortfall drawn from first liquid asset
      const l = firstLiquid();
      if (l) { l.value = Math.max(0, l.value + pool); l.contrib += pool; }
    }

    income *= incomeGrowthM;
    expenses *= expenseGrowthM;
  }

  // Final per-asset decomposition
  const breakdown = assets.map((x) => ({ id: x.id, name: x.name, start: x.start, contrib: x.contrib, growth: x.growth, end: x.value }));

  const goalFunding = goalState.map((g) => ({ id: g.id, name: g.name, isEmergencyFund: g.isEmergencyFund, fundedMonth: g.fundedMonth }));

  return { series, milestones, breakdown, overflowId, goalFunding };
}

const C = {
  ink: "#1f2420",
  forest: "#2f4438",
  moss: "#4a6451",
  brass: "#b08a3e",
  brassLight: "#d9b873",
  paper: "#f3efe6",

  green: "#3f6b4a",

};

function FinanceTracker() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("overview");
  const [saving, setSaving] = useState(false);

  const [status, setStatus] = useState("connecting"); // connecting | online | local | error
  const saveTimer = useRef(null);
  const skipNextRealtime = useRef(false);

  // Initial load from Supabase (falls back to local cache, then defaults)
  useEffect(() => {
    (async () => {
      const cached = loadLocal();
      if (!sb) { setData(cached || DEFAULT_DATA); setStatus("local"); return; }
      try {
        const { data: row, error } = await sb
          .from(SUPABASE_TABLE).select("payload").eq("id", HOUSEHOLD_ID).maybeSingle();
        if (error) throw error;
        if (row && row.payload) {
          setData(migrate(row.payload));
          setStatus("online");
        } else {
          // First run: seed the row
          const seed = cached || DEFAULT_DATA;
          await sb.from(SUPABASE_TABLE).upsert({ id: HOUSEHOLD_ID, payload: seed });
          setData(seed);
          setStatus("online");
        }
      } catch (e) {
        console.error("Supabase load failed:", e);
        setData(cached || DEFAULT_DATA);
        setStatus("error");
      }
    })();
  }, []);

  // Realtime subscription: apply changes made by the other person
  useEffect(() => {
    if (!sb) return;
    const channel = sb
      .channel("household-changes")
      .on("postgres_changes",
        { event: "*", schema: "public", table: SUPABASE_TABLE, filter: `id=eq.${HOUSEHOLD_ID}` },
        (payload) => {
          if (skipNextRealtime.current) { skipNextRealtime.current = false; return; }
          if (payload.new && payload.new.payload) {
            setData(migrate(payload.new.payload));
          }
        })
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, []);

  const persist = useCallback((next) => {
    setData(next);
    saveLocal(next);
    if (!sb) { setStatus("local"); return; }
    setSaving(true);
    clearTimeout(saveTimer.current);
    // debounce writes so rapid typing doesn't hammer the DB
    saveTimer.current = setTimeout(async () => {
      try {
        skipNextRealtime.current = true;
        const { error } = await sb.from(SUPABASE_TABLE)
          .upsert({ id: HOUSEHOLD_ID, payload: next, updated_at: new Date().toISOString() });
        if (error) throw error;
        setStatus("online");
      } catch (e) {
        console.error("Save failed:", e);
        setStatus("error");
      } finally {
        setSaving(false);
      }
    }, 600);
  }, []);

  const reload = useCallback(async () => {
    if (!sb) { const c = loadLocal(); if (c) setData(c); return; }
    try {
      const { data: row } = await sb.from(SUPABASE_TABLE).select("payload").eq("id", HOUSEHOLD_ID).maybeSingle();
      if (row && row.payload) { setData(migrate(row.payload)); setStatus("online"); }
    } catch (e) { console.error(e); }
  }, []);

  if (!data) {
    return (
      <div style={{ minHeight: "100vh", background: C.paper, display: "grid", placeItems: "center", fontFamily: "Georgia, serif", color: C.muted }}>
        Loading your ledger…
      </div>
    );
  }

  const totalAssets = sum(data.assets);
  const totalLiabilities = sum(data.liabilities);
  const netWorth = totalAssets - totalLiabilities;
  const monthlyIncome = sum(data.income);
  const monthlyExpenses = sum(data.expenses);
  const monthlyNet = monthlyIncome - monthlyExpenses;

  const tabs = [
    { id: "overview", label: "Overview", icon: "M21 12V7H5a2 2 0 0 1 0-4h14v4M21 12v5H5a2 2 0 0 0 0 4h14v-4" },
    { id: "networth", label: "Net Worth", icon: "M22 7l-8.5 8.5-5-5L2 17|M16 7h6v6" },
    { id: "history", label: "History", icon: "M3 3v5h5|M3.05 13A9 9 0 1 0 6 5.3L3 8|M12 7v5l4 2" },
    { id: "cashflow", label: "Cash Flow", icon: "M3 3v18h18|M18 9l-5 5-4-4-3 3" },
    { id: "goals", label: "Goals", icon: "M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z|M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12z|M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" },
    { id: "projection", label: "Projection", icon: "M3 3v18h18|M18 9l-5 5-4-4-3 3" },
    { id: "scenarios", label: "Scenarios", icon: "M19 8a7 7 0 0 0-14 0c0 2 1 4 3 5v3h8v-3c2-1 3-3 3-5z|M9 17v2a3 3 0 0 0 6 0v-2" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: C.paper, fontFamily: "'Helvetica Neue', Arial, sans-serif", color: C.ink }}>

function useListEditor(data, persist, key) {
  const change = (id, field, val) => {
    const next = { ...data, [key]: data[key].map((x) => (x.id === id ? { ...x, [field]: field === "value" ? val : val } : x)) };
    persist(next);
  };
  const add = () => persist({ ...data, [key]: [...data[key], { id: key + Date.now(), name: "New item", value: 0 }] });
  const remove = (id) => persist({ ...data, [key]: data[key].filter((x) => x.id !== id) });
  return { change, add, remove };
}

// Reorder hook: returns drag state + handlers. Reorders `items` and calls onReorder(newArray).
function useDragReorder(items, onReorder) {
  const [dragId, setDragId] = React.useState(null);
  const [overId, setOverId] = React.useState(null);
  const touchData = React.useRef(null);

  const reorder = (fromId, toId) => {
    if (fromId === toId) return;
    const from = items.findIndex((x) => x.id === fromId);
    const to = items.findIndex((x) => x.id === toId);
    if (from < 0 || to < 0) return;
    const next = [...items];
    const [moved] = next.splice(from, 1);
    next.splice(to, 0, moved);
    onReorder(next);
  };

  // Desktop HTML5 drag
  const dragProps = (id) => ({
    draggable: true,
    onDragStart: (e) => { setDragId(id); e.dataTransfer.effectAllowed = "move"; },
    onDragOver: (e) => { e.preventDefault(); if (overId !== id) setOverId(id); },
    onDrop: (e) => { e.preventDefault(); reorder(dragId, id); setDragId(null); setOverId(null); },
    onDragEnd: () => { setDragId(null); setOverId(null); },
  });

  // Touch drag (mobile)
  const touchProps = (id) => ({
    onTouchStart: (e) => { touchData.current = { id }; setDragId(id); },
    onTouchMove: (e) => {
      const t = e.touches[0];
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const row = el && el.closest("[data-rowid]");
      if (row) { const rid = row.getAttribute("data-rowid"); if (rid !== overId) setOverId(rid); }
    },
    onTouchEnd: () => { if (touchData.current && overId) reorder(touchData.current.id, overId); touchData.current = null; setDragId(null); setOverId(null); },
  });

  return { dragId, overId, dragProps, touchProps };
}

  );
}

// ---- Net Worth tab ----
function Ledger({ data, persist }) {
  const toggleLiquid = (id) => {
    persist({ ...data, assets: data.assets.map((a) => a.id === id ? { ...a, liquid: !a.liquid } : a) });
  };
  const changeAsset = (id, field, val) =>
    persist({ ...data, assets: data.assets.map((a) => a.id === id ? { ...a, [field]: val } : a) });
  const addAsset = () =>
    persist({ ...data, assets: [...data.assets, { id: "a" + Date.now(), name: "New asset", value: 0, liquid: false, growthRate: DEFAULT_ASSET_GROWTH }] });
  const removeAsset = (id) =>
    persist({ ...data, assets: data.assets.filter((a) => a.id !== id) });
  const reorderAssets = (next) => persist({ ...data, assets: next });

  const changeLiab = (id, field, val) =>
    persist({ ...data, liabilities: data.liabilities.map((x) => x.id === id ? { ...x, [field]: val } : x) });
  const addLiab = () =>
    persist({ ...data, liabilities: [...data.liabilities, { id: "l" + Date.now(), name: "New liability", value: 0, rate: 0, payment: 0 }] });
  const removeLiab = (id) =>
    persist({ ...data, liabilities: data.liabilities.filter((x) => x.id !== id) });
  const reorderLiabilities = (next) => persist({ ...data, liabilities: next });

  const drag = useDragReorder(data.assets, reorderAssets);
  const ldrag = useDragReorder(data.liabilities, reorderLiabilities);

  const liquidTotal = sum(data.assets.filter((a) => a.liquid));

  const ASSET_COLS = "24px 1fr 110px 64px 40px 30px";
  const LIAB_COLS = "24px 1fr 90px 50px 64px 56px 30px";

  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(340px, 1fr))", gap: 20 }}>
      <Card title="Assets" accent={C.green}>
        <div style={{ display: "grid", gridTemplateColumns: ASSET_COLS, padding: "0 4px 8px", gap: 4,
          fontSize: 10, textTransform: "uppercase", letterSpacing: 0.5, color: C.muted, borderBottom: `1px solid ${C.line}` }}>
          <span /><span>Item</span><span style={{ textAlign: "right" }}>Value</span>
          <span style={{ textAlign: "right" }} title="Annual growth %">Grow%</span>
          <span style={{ textAlign: "center" }} title="Liquid / accessible">💧</span>
          <span />
        </div>
        {data.assets.map((a) => {
          const isOver = drag.overId === a.id && drag.dragId !== a.id;
          const isDragging = drag.dragId === a.id;
          return (
            <div key={a.id} data-rowid={a.id} className="row-in"
              {...drag.dragProps(a.id)}
              style={{ display: "grid", gridTemplateColumns: ASSET_COLS, alignItems: "center", gap: 4,
                borderBottom: `1px solid ${C.line}`, borderTop: isOver ? `2px solid ${C.brass}` : "2px solid transparent",
                opacity: isDragging ? 0.4 : 1, background: isDragging ? C.paper : "transparent" }}>
              <span {...drag.touchProps(a.id)} style={{ touchAction: "none" }}>
                <DragHandle active={isDragging} />
              </span>
              <input className="cell namecell" value={a.name} onChange={(e) => changeAsset(a.id, "name", e.target.value)} />
              <input className="cell tnum" type="number" value={a.value} onChange={(e) => changeAsset(a.id, "value", e.target.value)} />
              <input className="cell tnum" type="number" step="0.5"
                value={a.growthRate != null ? a.growthRate : DEFAULT_ASSET_GROWTH}
                onChange={(e) => changeAsset(a.id, "growthRate", Number(e.target.value))}
                title="Expected annual growth %" />
              <button onClick={() => toggleLiquid(a.id)} title={a.liquid ? "Liquid — click to remove" : "Mark as liquid/accessible"}
                style={{ background: "none", border: "none", display: "grid", placeItems: "center", fontSize: 15,
                  opacity: a.liquid ? 1 : 0.25, cursor: "pointer", transition: "opacity .15s" }}>
                💧
              </button>
              <button onClick={() => removeAsset(a.id)}
                style={{ background: "none", border: "none", color: C.muted, display: "grid", placeItems: "center" }}>
                <Ic d="M3 6h18|M8 6V4h8v2|M19 6l-1 14H6L5 6|M10 11v6|M14 11v6" size={14} />
              </button>
            </div>
          );
        })}
        <button onClick={addAsset}
          style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 6, background: "none",
            border: `1px dashed ${C.moss}`, color: C.forest, padding: "8px 14px", borderRadius: 8, fontSize: 13 }}>
          <Ic d="M12 5v14|M5 12h14" size={14} /> Add row
        </button>
        <Total label="Total assets" value={sum(data.assets)} color={C.green} />
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, paddingTop: 8,
          borderTop: `1px dashed ${C.line}`, fontSize: 13, color: C.muted }}>
          <span>💧 Liquid / accessible</span>
          <span className="tnum" style={{ fontWeight: 600, color: C.moss }}>{fmt(liquidTotal)}</span>
        </div>
        <p style={{ fontSize: 12, color: C.muted, marginTop: 8, lineHeight: 1.5 }}>

      </Card>

      <Card title="Liabilities" accent={C.red}>
        <div style={{ display: "grid", gridTemplateColumns: LIAB_COLS, padding: "0 4px 8px", gap: 4,

          <span /><span>Item</span><span style={{ textAlign: "right" }}>Balance</span>
          <span style={{ textAlign: "right" }} title="Interest rate %">Rate%</span>
          <span style={{ textAlign: "right" }} title="Months left (from your statement)">Mo.left</span>
          <span style={{ textAlign: "right" }} title="Monthly payment">Pay/mo</span>
          <span />
        </div>

          const isOver = ldrag.overId === x.id && ldrag.dragId !== x.id;

          const mr = Number(x.monthsRemaining) || 0;
          // computed P&I payment when months-left drives it
          const val = Number(x.value) || 0, rt = Number(x.rate) || 0;
          let computedPay = null;
          if (mr > 0 && val > 0) {
            const im = rt / 100 / 12;
            computedPay = im > 0 ? (val * im) / (1 - Math.pow(1 + im, -mr)) : val / mr;
          }
          return (
            <div key={x.id} data-rowid={x.id} className="row-in"
              {...ldrag.dragProps(x.id)}
              style={{ display: "grid", gridTemplateColumns: LIAB_COLS, alignItems: "center", gap: 4,
                borderBottom: `1px solid ${C.line}`, borderTop: isOver ? `2px solid ${C.brass}` : "2px solid transparent",
                opacity: isDragging ? 0.4 : 1, background: isDragging ? C.paper : "transparent" }}>
              <span {...ldrag.touchProps(x.id)} style={{ touchAction: "none" }}>
                <DragHandle active={isDragging} />
              </span>
              <input className="cell namecell" value={x.name} onChange={(e) => changeLiab(x.id, "name", e.target.value)} />
              <input className="cell tnum" type="number" value={x.value} onChange={(e) => changeLiab(x.id, "value", e.target.value)} />
              <input className="cell tnum" type="number" step="0.1" value={x.rate != null ? x.rate : 0}
                onChange={(e) => changeLiab(x.id, "rate", Number(e.target.value))} title="Interest rate %" />
              <input className="cell tnum" type="number" value={x.monthsRemaining != null ? x.monthsRemaining : ""}
                placeholder="—"
                onChange={(e) => changeLiab(x.id, "monthsRemaining", e.target.value === "" ? "" : Number(e.target.value))}
                title="Months left from your loan statement (overrides payment)" />
              {computedPay != null ? (
                <span className="tnum" title="Auto-calculated from months left"
                  style={{ textAlign: "right", fontSize: 13, color: C.moss, fontWeight: 600, paddingRight: 8 }}>
                  {fmt(computedPay)}
                </span>
              ) : (
                <input className="cell tnum" type="number" value={x.payment != null ? x.payment : 0}
                  onChange={(e) => changeLiab(x.id, "payment", Number(e.target.value))} title="Monthly payment (P&I only)" />
              )}
              <button onClick={() => removeLiab(x.id)}
                style={{ background: "none", border: "none", color: C.muted, display: "grid", placeItems: "center" }}>
                <Ic d="M3 6h18|M8 6V4h8v2|M19 6l-1 14H6L5 6|M10 11v6|M14 11v6" size={14} />
              </button>
            </div>
          );
        })}
        <button onClick={addLiab}
          style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 6, background: "none",
            border: `1px dashed ${C.moss}`, color: C.forest, padding: "8px 14px", borderRadius: 8, fontSize: 13 }}>
          <Ic d="M12 5v14|M5 12h14" size={14} /> Add row
        </button>
        <Total label="Total liabilities" value={sum(data.liabilities)} color={C.red} />
        <p style={{ fontSize: 12, color: C.muted, marginTop: 8, lineHeight: 1.5 }}>
          Enter <strong>Months left</strong> from your loan statement for the most accurate payoff date — the payment is then calculated for you (shown in green). Leave it blank to instead enter your own P&amp;I payment and have the payoff date derived from it.
        </p>
      </Card>
    </div>
  );
}

    <>
      <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 20 }}>

        <Stat label="Monthly Expenses" value={fmt(monthlyExpenses)} color={C.red} />
        <Stat label="Left Over" value={fmt(monthlyNet)} color={monthlyNet >= 0 ? C.forest : C.red} />

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 20 }}>

          <ItemTable items={data.income} onChange={inc.change} onAdd={inc.add} onRemove={inc.remove} onReorder={reorderIncome} valueLabel="Monthly" />
          <Total label="Total income" value={monthlyIncome} color={C.green} />
        </Card>
        <Card title="Expenses" accent={C.red}>
          <ItemTable items={data.expenses} onChange={exp.change} onAdd={exp.add} onRemove={exp.remove} onReorder={reorderExpenses} valueLabel="Monthly" />
          <Total label="Total expenses" value={monthlyExpenses} color={C.red} />
        </Card>
      </div>
    </>
  );
}

// ---- Goals tab ----
function Goals({ data, persist, monthlyNet, monthlyExpenses }) {
  const liquidAssets = data.assets.filter((a) => a.liquid);

  // Ensure all goals have required fields
  const goals = data.goals.map((g, i) => ({
    isEmergencyFund: false, expenseMonths: 3, priority: i, splitWeight: 100, linkedAssets: [], saved: 0,
    ...g,
  }));

  const updateGoal = (id, updates) =>
    persist({ ...data, goals: goals.map((g) => g.id === id ? { ...g, ...updates } : g) });

  const addGoal = () => {
    const maxPriority = goals.length > 0 ? Math.max(...goals.map((g) => g.priority)) : 0;
    persist({ ...data, goals: [...goals, { id: "g" + Date.now(), name: "New goal", target: 10000, saved: 0, linkedAssets: [], isEmergencyFund: false, expenseMonths: 3, priority: maxPriority + 1, splitWeight: 100 }] });
  };

  const removeGoal = (id) => persist({ ...data, goals: goals.filter((g) => g.id !== id) });

  const moveGoal = (id, dir) => {
    // Swap priorities with neighbour
    const sorted = [...goals].sort((a, b) => a.priority - b.priority);
    const idx = sorted.findIndex((g) => g.id === id);
    const swapIdx = idx + dir;
    if (swapIdx < 0 || swapIdx >= sorted.length) return;
    // Don't move above emergency fund
    if (sorted[swapIdx].isEmergencyFund && dir === -1) return;
    if (sorted[idx].isEmergencyFund && dir === 1) return;
    const newGoals = goals.map((g) => {
      if (g.id === sorted[idx].id) return { ...g, priority: sorted[swapIdx].priority };
      if (g.id === sorted[swapIdx].id) return { ...g, priority: sorted[idx].priority };
      return g;
    });
    persist({ ...data, goals: newGoals });
  };

  // ---- Liquid pool: total accessible money to distribute across goals ----
  // All liquid assets form ONE pool. It fills goals in priority order:
  // goal 1 takes what it needs, the remainder flows to goal 2, etc.
  const totalLiquid = sum(liquidAssets);

  const sortedGoals = [...goals].sort((a, b) => a.priority - b.priority);

  // Build priority tiers (goals sharing a priority split within the tier)
  const buildTiers = () => {
    const tiers = [];
    sortedGoals.forEach((g) => {
      const target = g.isEmergencyFund ? Math.round((g.expenseMonths || 3) * monthlyExpenses) : (g.target || 0);
      const last = tiers[tiers.length - 1];
      const entry = { ...g, _target: target };
      if (last && last.priority === g.priority) last.goals.push(entry);
      else tiers.push({ priority: g.priority, goals: [entry] });
    });
    return tiers;
  };
  const tiers = buildTiers();

  // Cascade the liquid pool down the tiers → savedAlloc[goalId]
  const savedAlloc = {};
  let liquidLeft = totalLiquid;
  tiers.forEach((tier) => {
    const need = tier.goals.map((g) => ({ id: g.id, target: g._target, weight: g.splitWeight || 100 }));
    const tierNeed = need.reduce((t, n) => t + n.target, 0);
    if (liquidLeft <= 0) { need.forEach((n) => { savedAlloc[n.id] = 0; }); return; }
    const tierBudget = Math.min(liquidLeft, tierNeed);
    if (tier.goals.length === 1) {
      savedAlloc[tier.goals[0].id] = Math.min(tier.goals[0]._target, tierBudget);
    } else {
      // Split by weight, but cap each at its target and redistribute overflow
      const totalWeight = need.reduce((t, n) => t + n.weight, 0);
      let pool = tierBudget;
      const order = [...need];
      order.forEach((n) => { savedAlloc[n.id] = 0; });
      // iterative fill so overflow from a capped goal flows to the others
      let active = order.filter((n) => savedAlloc[n.id] < n.target);
      while (pool > 1 && active.length > 0) {
        const w = active.reduce((t, n) => t + n.weight, 0);
        let distributed = 0;
        active.forEach((n) => {
          const give = Math.min(n.target - savedAlloc[n.id], (pool * n.weight) / w);
          savedAlloc[n.id] += give;
          distributed += give;
        });
        pool -= distributed;
        active = order.filter((n) => savedAlloc[n.id] < n.target - 0.5);
        if (distributed < 1) break;
      }
      need.forEach((n) => { savedAlloc[n.id] = Math.round(savedAlloc[n.id]); });
    }
    const used = tier.goals.reduce((t, g) => t + (savedAlloc[g.id] || 0), 0);
    liquidLeft -= used;
  });
  const unallocatedLiquid = Math.max(0, Math.round(liquidLeft));

  // ---- Surplus waterfall: how monthly surplus fills the REMAINING gaps ----
  let remainingSurplus = Math.max(0, monthlyNet);
  const surplusAlloc = {};
  tiers.forEach((tier) => {
    const incomplete = tier.goals
      .map((g) => ({ ...g, _remaining: Math.max(0, g._target - (savedAlloc[g.id] || 0)) }))
      .filter((g) => g._remaining > 0);
    if (incomplete.length === 0 || remainingSurplus <= 0) {
      tier.goals.forEach((g) => { surplusAlloc[g.id] = surplusAlloc[g.id] || 0; });
      return;
    }
    const totalWeight = incomplete.reduce((t, g) => t + (g.splitWeight || 100), 0);
    const tierNeeded = incomplete.reduce((t, g) => t + g._remaining, 0);
    const tierBudget = Math.min(remainingSurplus, tierNeeded);
    incomplete.forEach((g) => {
      const share = (g.splitWeight || 100) / totalWeight;
      surplusAlloc[g.id] = Math.min(g._remaining, Math.round(tierBudget * share));
    });
    remainingSurplus -= tierBudget;
  });

  // Helper: per-goal computed values
  const goalCompute = (g) => {
    const target = g.isEmergencyFund ? Math.round((g.expenseMonths || 3) * monthlyExpenses) : (g.target || 0);
    const saved = savedAlloc[g.id] || 0;
    const remaining = Math.max(0, target - saved);
    const pct = target > 0 ? Math.min(100, Math.round((saved / target) * 100)) : 0;
    const alloc = surplusAlloc[g.id] || 0;
    const months = alloc > 0 ? Math.ceil(remaining / alloc) : null;
    const done = remaining <= 0 && target > 0;
    return { target, saved, remaining, pct, alloc, months, done };
  };

  const efGoal = goals.find((g) => g.isEmergencyFund);

  return (
    <>
      {/* Liquid pool summary */}
      <Card title="How your savings are allocated" accent={C.moss}>
        <p style={{ fontSize: 13, color: C.muted, marginTop: 0, marginBottom: 12, lineHeight: 1.6 }}>
          Your <strong className="tnum" style={{ color: C.forest }}>{fmt(totalLiquid)}</strong> in liquid accounts fills goals top to bottom. Each goal takes what it needs; the rest flows to the next.
        </p>
        <div>
          {sortedGoals.map((g, i) => {
            const { saved, target, done } = goalCompute(g);
            return (
              <div key={g.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                <div style={{ width: 22, height: 22, borderRadius: "50%", background: done ? C.green : saved > 0 ? C.moss : C.line,
                  color: done || saved > 0 ? "#fff" : C.muted, display: "grid", placeItems: "center", fontSize: 11, fontWeight: 700, flexShrink: 0 }}>
                  {done ? "✓" : i + 1}
                </div>
                <div style={{ flex: 1, fontSize: 13 }}>
                  <span style={{ color: done ? C.green : C.ink, fontWeight: done ? 600 : 400 }}>{g.name}</span>
                </div>
                <span className="tnum" style={{ fontSize: 13, fontWeight: 700, color: saved > 0 ? C.forest : C.muted }}>
                  {fmt(saved)} / {fmt(target)}
                </span>
              </div>
            );
          })}
          {unallocatedLiquid > 0 && (
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 10, paddingTop: 10, borderTop: `1px dashed ${C.line}` }}>
              <div style={{ width: 22, height: 22, borderRadius: "50%", background: C.brass, color: "#fff", display: "grid", placeItems: "center", fontSize: 12, flexShrink: 0 }}>✦</div>
              <div style={{ flex: 1, fontSize: 13, color: C.ink }}>Unallocated — all goals funded</div>
              <span className="tnum" style={{ fontSize: 13, fontWeight: 700, color: C.brass }}>{fmt(unallocatedLiquid)}</span>
            </div>
          )}
        </div>
      </Card>

      {/* Surplus flow summary */}
      {monthlyNet > 0 && (
        <Card title="Monthly surplus flow" accent={C.brass}>
          <p style={{ fontSize: 13, color: C.muted, marginTop: 0, marginBottom: 12, lineHeight: 1.6 }}>
            Your <strong className="tnum" style={{ color: C.forest }}>{fmt(monthlyNet)}</strong> monthly surplus fills the remaining gaps, in the same priority order.
          </p>
          <div>
            {sortedGoals.map((g, i) => {
              const { alloc, done } = goalCompute(g);
              return (
                <div key={g.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                  <div style={{ width: 22, height: 22, borderRadius: "50%", background: done ? C.green : alloc > 0 ? C.brass : C.line,
                    color: done || alloc > 0 ? "#fff" : C.muted, display: "grid", placeItems: "center", fontSize: 11, fontWeight: 700, flexShrink: 0 }}>
                    {done ? "✓" : i + 1}
                  </div>
                  <div style={{ flex: 1, fontSize: 13 }}>
                    <span style={{ color: done ? C.green : C.ink, fontWeight: done ? 600 : 400 }}>{g.name}</span>
                    {done && <span style={{ color: C.green, fontSize: 12, marginLeft: 6 }}>Funded</span>}
                  </div>
                  <span className="tnum" style={{ fontSize: 13, fontWeight: 700, color: alloc > 0 ? C.brass : C.muted }}>
                    {alloc > 0 ? `+${fmt(alloc)}/mo` : done ? "—" : "waiting"}
                  </span>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {/* Individual goal cards */}
      {sortedGoals.map((g, sortedIdx) => {
        const { target, saved, remaining, pct, alloc, months, done } = goalCompute(g);

        // Find goals at same priority tier for split UI
        const tierMates = goals.filter((x) => x.priority === g.priority && x.id !== g.id);
        const isFirstInTier = sortedGoals.find((x) => x.priority === g.priority)?.id === g.id;

        return (
          <Card key={g.id}>
            {/* Header row: priority badge + name + move buttons + delete */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
              <div style={{ width: 26, height: 26, borderRadius: "50%", background: done ? C.green : C.brass,
                color: "#fff", display: "grid", placeItems: "center", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
                {done ? "✓" : sortedIdx + 1}
              </div>
              <input className="cell namecell serif" style={{ fontSize: 17, flex: 1 }}
                value={g.name} onChange={(e) => updateGoal(g.id, { name: e.target.value })} />
              {!g.isEmergencyFund && (
                <div style={{ display: "flex", gap: 2 }}>
                  <button onClick={() => moveGoal(g.id, -1)} title="Move up" style={{ background: "none", border: "none", color: C.muted, padding: 4, fontSize: 14 }}>↑</button>
                  <button onClick={() => moveGoal(g.id, 1)} title="Move down" style={{ background: "none", border: "none", color: C.muted, padding: 4, fontSize: 14 }}>↓</button>
                </div>
              )}
              {g.isEmergencyFund && (
                <span style={{ fontSize: 11, background: C.forest, color: C.paper, padding: "2px 8px", borderRadius: 10, whiteSpace: "nowrap" }}>🛡 Emergency</span>
              )}
              {!g.isEmergencyFund && (
                <button onClick={() => removeGoal(g.id)} style={{ background: "none", border: "none", color: C.muted, padding: 4 }}>
                  <Ic d="M3 6h18|M8 6V4h8v2|M19 6l-1 14H6L5 6|M10 11v6|M14 11v6" size={15} />
                </button>
              )}
            </div>

            {/* Progress bar */}
            <div style={{ height: 16, background: C.paper, borderRadius: 8, overflow: "hidden", margin: "12px 0 5px" }}>
              <div style={{ width: `${pct}%`, height: "100%", background: done ? C.green : `linear-gradient(90deg, ${C.moss}, ${C.brass})`, borderRadius: 8, transition: "width .4s" }} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: C.muted, marginBottom: 14 }}>
              <span className="tnum">{fmt(saved)} of {fmt(target)}</span>
              <span style={{ fontWeight: 700, color: done ? C.green : C.forest }}>{done ? "🎉 Done!" : `${pct}%`}</span>
            </div>

            {/* Emergency fund: months-of-expenses target */}
            {g.isEmergencyFund && (
              <div style={{ background: C.paper, borderRadius: 10, padding: 12, marginBottom: 14 }}>
                <div style={{ fontSize: 12, textTransform: "uppercase", letterSpacing: 1, color: C.muted, marginBottom: 10 }}>Target: months of expenses</div>
                <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                  {[3, 4, 5, 6].map((mo) => (
                    <button key={mo} onClick={() => updateGoal(g.id, { expenseMonths: mo })}
                      style={{ flex: 1, padding: "8px 4px", borderRadius: 8, border: `2px solid ${g.expenseMonths === mo ? C.forest : C.line}`,
                        background: g.expenseMonths === mo ? C.forest : "transparent",
                        color: g.expenseMonths === mo ? C.paper : C.muted, fontSize: 13, fontWeight: g.expenseMonths === mo ? 700 : 400 }}>
                      {mo}mo
                    </button>
                  ))}
                </div>
                <p style={{ fontSize: 12, color: C.muted, margin: 0 }}>
                  {g.expenseMonths} months × {fmt(monthlyExpenses)}/mo = <strong style={{ color: C.forest }}>{fmt(target)}</strong> target
                </p>
              </div>
            )}

            {/* Manual target for non-EF goals */}
            {!g.isEmergencyFund && (
              <label style={{ fontSize: 12, color: C.muted, display: "block", marginBottom: 14 }}>
                Target ($)
                <input className="cell tnum" type="number" value={g.target}
                  onChange={(e) => updateGoal(g.id, { target: Number(e.target.value) })}
                  style={{ border: `1px solid ${C.line}`, marginTop: 4, borderRadius: 6, display: "block", width: 140 }} />
              </label>
            )}

            {/* Priority / split weight */}
            {!g.isEmergencyFund && (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 12, textTransform: "uppercase", letterSpacing: 1, color: C.muted, marginBottom: 8 }}>Priority tier</div>
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <span style={{ fontSize: 13, color: C.muted }}>Share tier with:</span>
                  {goals.filter((x) => !x.isEmergencyFund && x.id !== g.id).map((other) => {
                    const shared = other.priority === g.priority;
                    return (
                      <button key={other.id} onClick={() => {
                        if (shared) {
                          // Give this goal its own new priority slot between its current and next
                          const sorted2 = [...goals].sort((a, b) => a.priority - b.priority);
                          const myIdx = sorted2.findIndex((x) => x.id === g.id);
                          const nextPrio = myIdx < sorted2.length - 1 ? sorted2[myIdx + 1].priority : g.priority + 2;
                          updateGoal(g.id, { priority: g.priority + (nextPrio - g.priority) / 2 });
                        } else {
                          updateGoal(g.id, { priority: other.priority });
                        }
                      }}
                        style={{ padding: "5px 12px", borderRadius: 16, fontSize: 12,
                          background: shared ? C.moss : C.paper, color: shared ? C.paper : C.muted,
                          border: `1px solid ${shared ? C.moss : C.line}` }}>
                        {shared ? "✓ " : ""}{other.name}
                      </button>
                    );
                  })}
                </div>
                {/* Split weight slider — only shown if in a shared tier */}
                {tierMates.length > 0 && (
                  <div style={{ marginTop: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: C.muted, marginBottom: 4 }}>
                      <span>Split weight for this goal</span>
                      <span className="tnum" style={{ fontWeight: 700, color: C.forest }}>{g.splitWeight}%</span>
                    </div>
                    <input type="range" min={10} max={90} step={5} value={g.splitWeight}
                      onChange={(e) => updateGoal(g.id, { splitWeight: Number(e.target.value) })}
                      style={{ width: "100%", accentColor: C.brass }} />
                    {isFirstInTier && (
                      <p style={{ fontSize: 12, color: C.muted, marginTop: 4, marginBottom: 0 }}>
                        Surplus split: {g.name} gets {g.splitWeight}% · {tierMates.map((x) => `${x.name} gets ${100 - g.splitWeight}%`).join(" · ")}
                      </p>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* Funded-from-pool display */}
            {liquidAssets.length > 0 ? (
              <div style={{ background: C.paper, borderRadius: 8, padding: "10px 12px", marginBottom: 14, fontSize: 13, color: C.muted }}>
                {saved > 0
                  ? <>Funded with <strong className="tnum" style={{ color: C.forest }}>{fmt(saved)}</strong> from your liquid pool{remaining > 0 ? <>, <span className="tnum">{fmt(remaining)}</span> to go.</> : " — fully funded from savings."}</>
                  : <>Nothing allocated yet — higher-priority goals are using the available liquid funds first.</>}
              </div>
            ) : (
              <label style={{ fontSize: 12, color: C.muted, display: "block", marginBottom: 14 }}>
                {g.isEmergencyFund ? "Current balance ($)" : "Saved ($)"}
                <input className="cell tnum" type="number" value={g.saved}
                  onChange={(e) => updateGoal(g.id, { saved: Number(e.target.value) })}
                  style={{ border: `1px solid ${C.line}`, marginTop: 4, borderRadius: 6, display: "block", width: 140 }} />
              </label>
            )}

            {/* Timeline */}
            {!done && (
              <p style={{ fontSize: 13, color: C.muted, marginTop: 4, marginBottom: 0 }}>
                {alloc > 0
                  ? <>Receiving <strong className="tnum" style={{ color: C.brass }}>{fmt(alloc)}/mo</strong> from your surplus → funded in ~<strong style={{ color: C.forest }}>{months} month{months !== 1 ? "s" : ""}</strong>.</>
                  : monthlyNet <= 0
                    ? "No monthly surplus to allocate — update Cash Flow."
                    : "Waiting — higher-priority goals are being funded first."}
              </p>
            )}
          </Card>
        );
      })}

      {liquidAssets.length === 0 && (
        <div style={{ background: C.card, border: `1px dashed ${C.line}`, borderRadius: 12, padding: 14, marginBottom: 14, fontSize: 13, color: C.muted }}>
          💡 Go to <strong>Net Worth</strong> and tap 💧 next to accessible accounts so they fund your goals automatically.
        </div>
      )}

      <button onClick={addGoal} style={{ display: "flex", alignItems: "center", gap: 6, background: C.forest, border: "none", color: C.paper, padding: "10px 18px", borderRadius: 8, fontSize: 14 }}>
        <Ic d="M12 5v14|M5 12h14" size={16} /> Add a goal
      </button>
    </>
  );
}

// ---- Net Worth History tab ----
function NetWorthHistory({ data, persist, netWorth, totalAssets, totalLiabilities }) {
  const history = [...(data.history || [])].sort((a, b) => a.month.localeCompare(b.month));

  const currentMonth = new Date().toISOString().slice(0, 7); // YYYY-MM
  const [logMonth, setLogMonth] = useState(currentMonth);

  const logSnapshot = () => {
    const entry = { id: "h" + Date.now(), month: logMonth, netWorth, assets: totalAssets, liabilities: totalLiabilities };
    // Replace if a snapshot for that month already exists
    const others = (data.history || []).filter((h) => h.month !== logMonth);
    persist({ ...data, history: [...others, entry] });
  };

  const removeSnapshot = (id) => persist({ ...data, history: (data.history || []).filter((h) => h.id !== id) });

  const existing = history.find((h) => h.month === logMonth);
  const first = history[0];
  const last = history[history.length - 1];
  const change = first && last ? last.netWorth - first.netWorth : 0;

  const labelMonth = (m) => {
    const [y, mo] = m.split("-");
    return new Date(Number(y), Number(mo) - 1, 1).toLocaleDateString("en-US", { month: "short", year: "2-digit" });
  };

  return (
    <>
      <Card title="Log this month's snapshot" accent={C.brass}>
        <p style={{ color: C.muted, fontSize: 14, marginTop: 0, lineHeight: 1.6 }}>
          Your net worth right now is <strong className="tnum" style={{ color: C.forest }}>{fmt(netWorth)}</strong> (assets {fmt(totalAssets)} − liabilities {fmt(totalLiabilities)}).
          Pick a month and save it to your history. Logging the same month again updates that entry.
        </p>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "center" }}>
          <input type="month" value={logMonth} onChange={(e) => setLogMonth(e.target.value)}
            style={{ border: `1px solid ${C.line}`, borderRadius: 8, padding: "9px 12px", font: "inherit", color: C.ink, background: "#fff" }} />
          <button onClick={logSnapshot}
            style={{ display: "flex", alignItems: "center", gap: 7, background: C.forest, border: "none", color: C.paper, padding: "10px 18px", borderRadius: 8, fontSize: 14 }}>
            <Ic d="M8 2v4|M16 2v4|M3 10h18|M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z|M12 14v4|M10 16h4" size={16} /> {existing ? "Update this month" : "Save snapshot"}
          </button>
        </div>
      </Card>

      {history.length === 0 ? (
        <Card>
          <div style={{ textAlign: "center", padding: "20px 0", color: C.muted }}>
            <Ic d="M3 3v5h5|M3.05 13A9 9 0 1 0 6 5.3L3 8|M12 7v5l4 2" size={28} />
            <p style={{ marginBottom: 0 }}>No snapshots yet. Save one above to start your chart — then check back each month to watch the line grow.</p>
          </div>
        </Card>
      ) : (
        <>
          <Card title="Net worth over time" accent={C.forest}>
            {history.length >= 2 && (
              <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 18 }}>
                <MiniStat label="First logged" value={fmt(first.netWorth)} />
                <MiniStat label="Latest" value={fmt(last.netWorth)} color={C.forest} />
                <MiniStat label="Change" value={`${change >= 0 ? "+" : ""}${fmt(change)}`} color={change >= 0 ? C.green : C.red} />
              </div>
            )}
            <HistoryChart history={history} labelMonth={labelMonth} />
          </Card>

          <Card title="Logged snapshots">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 40px", padding: "0 8px 8px", fontSize: 12, textTransform: "uppercase", letterSpacing: 1, color: C.muted, borderBottom: `1px solid ${C.line}` }}>
              <span>Month</span><span style={{ textAlign: "right" }}>Net worth</span><span style={{ textAlign: "right" }}>Assets / Liab.</span><span />
            </div>
            {[...history].reverse().map((h) => (
              <div key={h.id} className="row-in" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 40px", alignItems: "center", borderBottom: `1px solid ${C.line}`, padding: "10px 8px" }}>
                <span className="serif" style={{ fontSize: 15 }}>{labelMonth(h.month)}</span>
                <span className="tnum" style={{ textAlign: "right", fontWeight: 700, color: C.forest }}>{fmt(h.netWorth)}</span>
                <span className="tnum" style={{ textAlign: "right", fontSize: 13, color: C.muted }}>{fmt(h.assets)} / {fmt(h.liabilities)}</span>
                <button onClick={() => removeSnapshot(h.id)} style={{ background: "none", border: "none", color: C.muted, display: "grid", placeItems: "center" }} title="Remove">

                </button>
              </div>
            ))}
          </Card>
        </>
      )}
    </>
  );
}

function HistoryChart({ history, labelMonth }) {
  const W = 720, H = 260, padL = 64, padR = 20, padT = 20, padB = 36;
  const vals = history.map((h) => h.netWorth);
  const maxV = Math.max(...vals);
  const minV = Math.min(...vals, 0);
  const range = maxV - minV || 1;

  const n = history.length;
  const x = (i) => padL + (n === 1 ? (W - padL - padR) / 2 : (i / (n - 1)) * (W - padL - padR));
  const y = (v) => padT + (1 - (v - minV) / range) * (H - padT - padB);

  const points = history.map((h, i) => ({ px: x(i), py: y(h.netWorth), ...h }));
  const linePath = points.map((p, i) => `${i === 0 ? "M" : "L"} ${p.px} ${p.py}`).join(" ");
  const areaPath = `${linePath} L ${points[n - 1].px} ${H - padB} L ${points[0].px} ${H - padB} Z`;

  // gridlines at 0%, 50%, 100%
  const gridVals = [minV, minV + range / 2, maxV];

  return (
    <div style={{ width: "100%", overflowX: "auto" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", minWidth: 320, display: "block" }} role="img" aria-label="Net worth history line chart">
        <defs>
          <linearGradient id="nwfill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={C.moss} stopOpacity="0.35" />
            <stop offset="100%" stopColor={C.moss} stopOpacity="0" />
          </linearGradient>
        </defs>
        {gridVals.map((gv, i) => (
          <g key={i}>
            <line x1={padL} y1={y(gv)} x2={W - padR} y2={y(gv)} stroke={C.line} strokeWidth="1" />
            <text x={padL - 10} y={y(gv) + 4} textAnchor="end" fontSize="11" fill={C.muted} fontFamily="Georgia, serif">
              {fmt(gv)}
            </text>
          </g>
        ))}
        {n >= 2 && <path d={areaPath} fill="url(#nwfill)" />}
        {n >= 2 && <path d={linePath} fill="none" stroke={C.forest} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />}
        {points.map((p, i) => (
          <g key={p.id}>
            <circle cx={p.px} cy={p.py} r="4.5" fill={C.brass} stroke="#fff" strokeWidth="2" />
            {(i === 0 || i === n - 1 || n <= 6) && (
              <text x={p.px} y={H - padB + 18} textAnchor="middle" fontSize="11" fill={C.muted} fontFamily="Georgia, serif">
                {labelMonth(p.month)}
              </text>
            )}
          </g>
        ))}
      </svg>
    </div>
  );
}

function monthsFromNow(ym) {
  if (!ym) return 0;
  const [y, m] = ym.split("-").map(Number);
  const now = new Date(); now.setDate(1);
  return Math.max(0, (y - now.getFullYear()) * 12 + (m - 1 - now.getMonth()));
}
function ymFromMonths(offset) {
  const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() + (offset || 0));
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}

const EVENT_TYPES = {
  child: { label: "👶 New child", color: "#7d6b8a" },
  home: { label: "🏠 Home purchase", color: "#5b7a8c" },
  income: { label: "💼 Income change", color: "#3f6b4a" },

  expense: { label: "🔁 Recurring expense change", color: "#9e4634" },
};

function Scenarios({ data, persist }) {
  const scenarios = data.scenarios || [];
  const [activeId, setActiveId] = useState(scenarios[0]?.id || null);
  const [compareId, setCompareId] = useState(null);

  const active = scenarios.find((s) => s.id === activeId) || null;
  const saveScenarios = (next) => persist({ ...data, scenarios: next });

  const addScenario = () => {
    const s = { id: "s" + Date.now(), name: "New scenario", events: [] };
    saveScenarios([...scenarios, s]);
    setActiveId(s.id);
  };
  const removeScenario = (id) => {
    const next = scenarios.filter((s) => s.id !== id);
    saveScenarios(next);
    if (activeId === id) setActiveId(next[0]?.id || null);
    if (compareId === id) setCompareId(null);
  };
  const updateScenario = (id, updates) =>
    saveScenarios(scenarios.map((s) => s.id === id ? { ...s, ...updates } : s));

  const addEvent = (type) => {
    if (!active) return;
    const base = { id: "ev" + Date.now(), type, startMonth: 12, label: EVENT_TYPES[type].label.replace(/^\S+\s/, "") };
    const defaults = {
      child: { monthlyExpense: 1400, leaveIncomeDelta: -2000, leaveEndMonth: 15, oneTimeCost: 2000 },
      home: { downPayment: 50000, closingCosts: 10000, mortgageRate: 6.5, termYears: 30, newAssetValue: 400000, appreciation: 3, housingCostDelta: 0 },
      income: { monthlyDelta: 1000, endMonth: null },
      onetime: { amount: -10000 },
      expense: { monthlyDelta: 300, endMonth: null },
    };
    updateScenario(active.id, { events: [...(active.events || []), { ...base, ...defaults[type] }] });
  };
  const updateEvent = (evId, updates) =>
    updateScenario(active.id, { events: active.events.map((e) => e.id === evId ? { ...e, ...updates } : e) });
  const removeEvent = (evId) =>
    updateScenario(active.id, { events: active.events.filter((e) => e.id !== evId) });

  const baseline = React.useMemo(() => runProjection(data), [data]);
  const activeProj = React.useMemo(() => active ? runProjection(data, { events: active.events || [] }) : null, [data, active]);
  const compareScenario = scenarios.find((s) => s.id === compareId) || null;
  const compareProj = React.useMemo(() => compareScenario ? runProjection(data, { events: compareScenario.events || [] }) : baseline, [data, compareScenario, baseline]);

  const horizonYears = (data.assumptions || {}).horizonYears || 20;

  if (scenarios.length === 0) {
    return (
      <Card title="Build your first scenario" accent={C.brass}>
        <p style={{ color: C.muted, fontSize: 14, lineHeight: 1.6, marginBottom: 16 }}>
          A scenario stacks life events — a second child, a new house, a raise — on top of your baseline projection, so you can see how they'd reshape your net worth and cash flow. Create one to start.
        </p>
        <button onClick={addScenario} style={{ display: "flex", alignItems: "center", gap: 6, background: C.forest, border: "none", color: C.paper, padding: "10px 18px", borderRadius: 8, fontSize: 14 }}>
          <Ic d="M12 5v14|M5 12h14" size={16} /> New scenario
        </button>
      </Card>
    );
  }

  return (
    <>
      <Card title="Scenarios" accent={C.brass}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {scenarios.map((s) => (
            <button key={s.id} onClick={() => setActiveId(s.id)}
              style={{ padding: "8px 14px", borderRadius: 20, fontSize: 13, border: `1px solid ${activeId === s.id ? C.forest : C.line}`,
                background: activeId === s.id ? C.forest : C.paper, color: activeId === s.id ? C.paper : C.muted, fontWeight: activeId === s.id ? 700 : 400 }}>
              {s.name}
            </button>
          ))}
          <button onClick={addScenario} style={{ padding: "8px 14px", borderRadius: 20, fontSize: 13, border: `1px dashed ${C.moss}`, background: "none", color: C.forest, display: "flex", alignItems: "center", gap: 4 }}>
            <Ic d="M12 5v14|M5 12h14" size={14} /> New
          </button>
        </div>
      </Card>

      {active && (
        <>
          <Card title="Edit scenario" accent={C.forest}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
              <input className="cell namecell serif" style={{ fontSize: 18, flex: 1, border: `1px solid ${C.line}`, borderRadius: 6, padding: "6px 8px" }}
                value={active.name} onChange={(e) => updateScenario(active.id, { name: e.target.value })} />
              <button onClick={() => removeScenario(active.id)} title="Delete scenario"
                style={{ background: "none", border: "none", color: C.muted, padding: 6 }}><Ic d="M3 6h18|M8 6V4h8v2|M19 6l-1 14H6L5 6|M10 11v6|M14 11v6" size={16} /></button>
            </div>

            {(active.events || []).length === 0 && (
              <p style={{ fontSize: 13, color: C.muted, marginBottom: 14 }}>No events yet. Add one below — you can stack as many as you like.</p>
            )}
            {(active.events || []).map((ev) => (
              <EventEditor key={ev.id} ev={ev} onChange={(u) => updateEvent(ev.id, u)} onRemove={() => removeEvent(ev.id)} />
            ))}

            <div style={{ marginTop: 14 }}>
              <div style={{ fontSize: 12, textTransform: "uppercase", letterSpacing: 1, color: C.muted, marginBottom: 8 }}>Add an event</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {Object.keys(EVENT_TYPES).map((t) => (
                  <button key={t} onClick={() => addEvent(t)}
                    style={{ padding: "7px 12px", borderRadius: 8, fontSize: 13, border: `1px solid ${C.line}`, background: C.paper, color: C.ink }}>
                    {EVENT_TYPES[t].label}

                ))}
              </div>
            </div>
          </Card>

          <Card title="Compare" accent={C.moss}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", marginBottom: 14 }}>
              <span style={{ fontSize: 13, color: C.muted }}>Compare</span>
              <strong style={{ fontSize: 13, color: C.forest }}>{active.name}</strong>
              <span style={{ fontSize: 13, color: C.muted }}>against</span>
              <select value={compareId || ""} onChange={(e) => setCompareId(e.target.value || null)}
                style={{ padding: "7px 10px", borderRadius: 8, border: `1px solid ${C.line}`, background: "#fff", font: "inherit", color: C.ink }}>
                <option value="">Baseline (no changes)</option>
                {scenarios.filter((s) => s.id !== active.id).map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>

            <CompareChart horizonYears={horizonYears}
              seriesA={activeProj.series} labelA={active.name}
              seriesB={compareProj.series} labelB={compareScenario ? compareScenario.name : "Baseline"} />

            <ComparisonDeltas horizonYears={horizonYears}
              seriesA={activeProj.series} labelA={active.name}
              seriesB={compareProj.series} labelB={compareScenario ? compareScenario.name : "Baseline"} />
          </Card>

          <ShortTermView scenarioProj={activeProj} baselineProj={baseline} scenarioName={active.name} />
        </>
      )}
    </>
  );
}

// Short-term feasibility: cash-flow runway + goal-delay vs baseline + near-term surplus
function ShortTermView({ scenarioProj, baselineProj, scenarioName }) {
  const WINDOW = 36; // months to examine for near-term feasibility
  const series = scenarioProj.series;
  const n = Math.min(WINDOW, series.length - 1);

  // Find the worst stretch of negative surplus and whether liquid savings can cover it.
  // Approximate liquid runway: cumulative negative surplus vs. starting liquid assets.
  const startLiquidGuess = series[0].assets > 0 ? series[0].assets : 0;
  let firstNegative = -1, worstSurplus = Infinity, cumulativeShortfall = 0, monthsNegative = 0;
  for (let i = 0; i <= n; i++) {
    const s = series[i].surplus;
    if (s < 0) {
      if (firstNegative < 0) firstNegative = i;
      monthsNegative++;
      cumulativeShortfall += -s;
      if (s < worstSurplus) worstSurplus = s;
    }
  }
  const anyNegative = firstNegative >= 0;

  // Tier the feasibility
  let tier, tierColor, tierMsg;
  if (!anyNegative) {
    tier = "Comfortably feasible"; tierColor = C.green;
    tierMsg = "Your monthly surplus stays positive throughout the near term — this scenario fits within your cash flow.";
  } else if (cumulativeShortfall <= startLiquidGuess) {
    tier = "Tight but doable"; tierColor = C.brass;
    const runwayMonths = worstSurplus < 0 ? Math.floor(startLiquidGuess / -worstSurplus) : 0;
    tierMsg = `Surplus dips negative for ${monthsNegative} month${monthsNegative !== 1 ? "s" : ""}. Your liquid savings can absorb the cumulative shortfall of ${fmt(cumulativeShortfall)} — roughly ${runwayMonths} month${runwayMonths !== 1 ? "s" : ""} of runway at the worst monthly gap.`;
  } else {
    tier = "Not feasible as-is"; tierColor = C.red;
    tierMsg = `Surplus goes negative and the cumulative shortfall of ${fmt(cumulativeShortfall)} would exceed your liquid savings of about ${fmt(startLiquidGuess)}. You'd need to cut costs, delay the event, or add income to make this work.`;
  }

  // Goal delays vs baseline
  const baseFunding = {};
  baselineProj.goalFunding.forEach((g) => { baseFunding[g.id] = g.fundedMonth; });
  const delays = scenarioProj.goalFunding.map((g) => {
    const baseM = baseFunding[g.id];
    const scenM = g.fundedMonth;
    let delta = null;
    if (baseM != null && scenM != null) delta = scenM - baseM;
    return { ...g, baseM, scenM, delta };
  });

  const monthToLabel = (m) => {
    if (m == null) return "not within horizon";
    const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() + m);
    return d.toLocaleDateString("en-US", { month: "short", year: "numeric" });
  };

  return (
    <Card title="Short-term feasibility" accent={tierColor}>
      {/* feasibility verdict */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
        <span style={{ width: 12, height: 12, borderRadius: "50%", background: tierColor, flexShrink: 0 }} />
        <span className="serif" style={{ fontSize: 18, fontWeight: 700, color: tierColor }}>{tier}</span>
      </div>
      <p style={{ fontSize: 13, color: C.muted, lineHeight: 1.6, marginTop: 0, marginBottom: 18 }}>{tierMsg}</p>

      {/* near-term surplus bars */}
      <div style={{ fontSize: 12, textTransform: "uppercase", letterSpacing: 1, color: C.muted, marginBottom: 10 }}>
        Monthly surplus — next {n} months
      </div>
      <SurplusBars series={series} months={n} />

      {/* goal delays */}
      <div style={{ marginTop: 20, paddingTop: 16, borderTop: `1px dashed ${C.line}` }}>
        <div style={{ fontSize: 12, textTransform: "uppercase", letterSpacing: 1, color: C.muted, marginBottom: 10 }}>
          Goal timing vs. baseline
        </div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, minWidth: 360 }}>
            <thead>
              <tr style={{ borderBottom: `2px solid ${C.ink}` }}>
                <th style={{ textAlign: "left", padding: "6px 8px", fontSize: 11, textTransform: "uppercase", color: C.muted }}>Goal</th>
                <th style={{ textAlign: "right", padding: "6px 8px", fontSize: 11, textTransform: "uppercase", color: C.muted }}>Baseline</th>
                <th style={{ textAlign: "right", padding: "6px 8px", fontSize: 11, textTransform: "uppercase", color: C.muted }}>{scenarioName}</th>
                <th style={{ textAlign: "right", padding: "6px 8px", fontSize: 11, textTransform: "uppercase", color: C.muted }}>Delay</th>
              </tr>
            </thead>
            <tbody>
              {delays.map((g) => (
                <tr key={g.id} style={{ borderBottom: `1px solid ${C.line}` }}>
                  <td style={{ padding: "7px 8px" }}>{g.name}{g.isEmergencyFund ? " 🛡" : ""}</td>
                  <td className="tnum" style={{ textAlign: "right", padding: "7px 8px", color: C.muted }}>{monthToLabel(g.baseM)}</td>
                  <td className="tnum" style={{ textAlign: "right", padding: "7px 8px" }}>{monthToLabel(g.scenM)}</td>
                  <td className="tnum" style={{ textAlign: "right", padding: "7px 8px", fontWeight: 700, color: g.delta == null ? C.muted : g.delta > 0 ? C.red : g.delta < 0 ? C.green : C.muted }}>
                    {g.delta == null ? "—" : g.delta === 0 ? "no change" : g.delta > 0 ? `+${g.delta} mo` : `${g.delta} mo`}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <p style={{ fontSize: 12, color: C.muted, marginTop: 10, marginBottom: 0, lineHeight: 1.5 }}>
          A positive delay means this scenario pushes the goal later. "Not within horizon" means the goal isn't funded inside your projection window in that path.
        </p>
      </div>
    </Card>
  );
}

function SurplusBars({ series, months }) {
  const W = 680, H = 140, pL = 50, pR = 10, pT = 10, pB = 22;
  const vals = [];
  for (let i = 0; i <= months; i++) vals.push(series[i].surplus);
  const maxV = Math.max(...vals, 0), minV = Math.min(...vals, 0);
  const range = (maxV - minV) || 1;
  const bw = (W - pL - pR) / (months + 1);
  const zeroY = pT + (maxV / range) * (H - pT - pB);
  const barH = (v) => Math.abs(v) / range * (H - pT - pB);

  return (
    <div style={{ width: "100%", overflowX: "auto" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", minWidth: 360, display: "block" }}>
        <line x1={pL} y1={zeroY} x2={W - pR} y2={zeroY} stroke={C.muted} strokeWidth="1" />
        <text x={pL - 6} y={zeroY + 3} textAnchor="end" fontSize="9" fill={C.muted} fontFamily="Georgia, serif">$0</text>
        <text x={pL - 6} y={pT + 6} textAnchor="end" fontSize="9" fill={C.muted} fontFamily="Georgia, serif">{fmt(maxV)}</text>
        {minV < 0 && <text x={pL - 6} y={H - pB} textAnchor="end" fontSize="9" fill={C.red} fontFamily="Georgia, serif">{fmt(minV)}</text>}
        {vals.map((v, i) => {
          const x = pL + i * bw;
          const h = barH(v);
          const y = v >= 0 ? zeroY - h : zeroY;
          return <rect key={i} x={x} y={y} width={Math.max(1, bw - 1.5)} height={Math.max(0.5, h)} fill={v >= 0 ? C.moss : C.red} rx="1" />;
        })}
        {[0, 12, 24, 36].filter((m) => m <= months).map((m) => (
          <text key={m} x={pL + m * bw} y={H - 6} textAnchor="middle" fontSize="9" fill={C.muted} fontFamily="Georgia, serif">{m === 0 ? "now" : `${m}mo`}</text>
        ))}
      </svg>
    </div>
  );
}
