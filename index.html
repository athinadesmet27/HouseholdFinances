function CompareChart({ seriesA, labelA, seriesB, labelB, horizonYears }) {
  if (!seriesA || !seriesB) return null;
  const W = 680, H = 280, pL = 70, pR = 16, pT = 16, pB = 36;
  const n = Math.min(seriesA.length, seriesB.length);
  const all = [...seriesA.slice(0, n).map((s) => s.netWorth), ...seriesB.slice(0, n).map((s) => s.netWorth)];
  const maxV = Math.max(...all, 0), minV = Math.min(...all, 0), range = maxV - minV || 1;
  const cx = (i) => pL + (i / (n - 1)) * (W - pL - pR);
  const cy = (v) => pT + (1 - (v - minV) / range) * (H - pT - pB);
  const path = (s) => s.slice(0, n).map((p, i) => `${i === 0 ? "M" : "L"} ${cx(i)} ${cy(p.netWorth)}`).join(" ");
  const gridVals = [minV, minV + range / 2, maxV];
  const yearTicks = []; for (let y = 0; y <= horizonYears; y += Math.max(1, Math.ceil(horizonYears / 6))) yearTicks.push(y);

  return (
    <div style={{ width: "100%", overflowX: "auto" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", minWidth: 320, display: "block" }}>
        {gridVals.map((gv, i) => (
          <g key={i}>
            <line x1={pL} y1={cy(gv)} x2={W - pR} y2={cy(gv)} stroke={C.line} strokeWidth="1" />
            <text x={pL - 6} y={cy(gv) + 4} textAnchor="end" fontSize="10" fill={C.muted} fontFamily="Georgia, serif">{fmt(gv)}</text>
          </g>
        ))}
        {yearTicks.map((y) => { const i = Math.min(n - 1, y * 12); return <text key={y} x={cx(i)} y={H - pB + 16} textAnchor="middle" fontSize="10" fill={C.muted} fontFamily="Georgia, serif">{y === 0 ? "now" : `${y}y`}</text>; })}
        <path d={path(seriesB)} fill="none" stroke={C.muted} strokeWidth="2" strokeDasharray="5 4" />
        <path d={path(seriesA)} fill="none" stroke={C.forest} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      </svg>
      <div style={{ display: "flex", gap: 16, marginTop: 10, flexWrap: "wrap" }}>
        <span style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: C.muted }}>
          <span style={{ width: 18, height: 3, background: C.forest, display: "inline-block" }} /> {labelA}
        </span>
        <span style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: C.muted }}>
          <span style={{ width: 18, height: 0, borderTop: `3px dashed ${C.muted}`, display: "inline-block" }} /> {labelB}
        </span>
      </div>
    </div>
  );
}

function ComparisonDeltas({ seriesA, labelA, seriesB, labelB, horizonYears }) {
  const years = [5, 10, 20, 30].filter((y) => y <= horizonYears);
  const rows = years.map((y) => {
    const i = Math.min(seriesA.length - 1, seriesB.length - 1, y * 12);
    const av = seriesA[i].netWorth, bv = seriesB[i].netWorth;
    return { y, av, bv, delta: av - bv };
  });
  return (
    <div style={{ marginTop: 18, paddingTop: 14, borderTop: `1px dashed ${C.line}` }}>
      <div style={{ fontSize: 12, textTransform: "uppercase", letterSpacing: 1, color: C.muted, marginBottom: 10 }}>Net worth difference ({labelA} − {labelB})</div>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, minWidth: 320 }}>
          <thead>
            <tr style={{ borderBottom: `2px solid ${C.ink}` }}>
              <th style={{ textAlign: "left", padding: "6px 8px", fontSize: 11, textTransform: "uppercase", color: C.muted }}>At</th>
              <th style={{ textAlign: "right", padding: "6px 8px", fontSize: 11, textTransform: "uppercase", color: C.muted }}>{labelA}</th>
              <th style={{ textAlign: "right", padding: "6px 8px", fontSize: 11, textTransform: "uppercase", color: C.muted }}>{labelB}</th>
              <th style={{ textAlign: "right", padding: "6px 8px", fontSize: 11, textTransform: "uppercase", color: C.muted }}>Diff</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r) => (
              <tr key={r.y} style={{ borderBottom: `1px solid ${C.line}` }}>
                <td style={{ padding: "7px 8px" }}>{r.y} yrs</td>
                <td className="tnum" style={{ textAlign: "right", padding: "7px 8px" }}>{fmt(r.av)}</td>
                <td className="tnum" style={{ textAlign: "right", padding: "7px 8px", color: C.muted }}>{fmt(r.bv)}</td>
                <td className="tnum" style={{ textAlign: "right", padding: "7px 8px", fontWeight: 700, color: r.delta >= 0 ? C.green : C.red }}>{fmtSigned(r.delta)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// Module-level so it doesn't remount on each render
function AssumptionSlider({ label, field, value, min, max, step, suffix, setA }) {
  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
        <span style={{ fontSize: 14, color: C.ink }}>{label}</span>
        <span className="serif tnum" style={{ fontWeight: 700, color: C.forest }}>{suffix === "$" ? fmt(value) : `${value}${suffix}`}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={(e) => setA(field, Number(e.target.value))} style={{ width: "100%", accentColor: C.brass }} />
    </div>
  );
}

// ---- Projection tab ----
function Projection({ data, persist }) {
  const a = data.assumptions || {};
  const setA = (field, val) =>
    persist({ ...data, assumptions: { ...a, [field]: val } });

  const horizonYears = a.horizonYears || 20;
  const { series, milestones, breakdown, overflowId } = React.useMemo(() => runProjection(data), [data]);

  const start = series[0];
  const end = series[series.length - 1];
  const startNW = start ? start.netWorth : 0;
  const endNW = end ? end.netWorth : 0;
  const growthTotal = endNW - startNW;

  // Totals for contributions vs growth across all assets
  const totalContrib = breakdown.reduce((t, b) => t + b.contrib, 0);
  const totalGrowth = breakdown.reduce((t, b) => t + b.growth, 0);
  const totalStart = breakdown.reduce((t, b) => t + b.start, 0);

  const checkpointYears = [5, 10, 20, 30].filter((y) => y <= horizonYears);
  // per-asset values at each checkpoint
  const assetNames = (start?.byAsset || []).map((x) => ({ id: x.id, name: x.name }));
  const checkpointRows = checkpointYears.map((y) => {
    const pt = series[Math.min(series.length - 1, y * 12)];
    return { y, byAsset: pt ? pt.byAsset : [], liabilities: pt ? pt.liabilities : 0, nw: pt ? pt.netWorth : 0, efBalance: pt ? (pt.efBalance || 0) : 0, efHolderId: pt ? pt.efHolderId : null };
  });

  // Emergency fund holder + helper to show an asset's FREE balance (EF carved out)
  const efHolderId = start?.efHolderId || null;
  const hasEF = (start?.efBalance || 0) > 0 || checkpointRows.some((c) => c.efBalance > 0);
  const freeAssetValue = (pt, assetId) => {
    const raw = (pt.byAsset.find((x) => x.id === assetId) || {}).value || 0;
    if (pt.efHolderId === assetId) return Math.max(0, raw - (pt.efBalance || 0));
    return raw;
  };
  const startPoint = start || { byAsset: [], efBalance: 0, efHolderId: null };

  const overflowName = (assetNames.find((x) => x.id === overflowId) || {}).name || "—";

  // palette for asset bands
  const bandColors = [C.forest, C.brass, C.moss, C.brassLight, "#7d6b8a", "#9e4634", "#5b7a8c", "#c08a5a"];

  return (
    <>
      <Card title="Your projected trajectory" accent={C.forest}>
        <p style={{ color: C.muted, fontSize: 13, marginTop: 0, lineHeight: 1.6, marginBottom: 16 }}>
          Where your net worth heads if nothing major changes. Each band is an asset growing at its own rate — so you can see not just the total, but how its make-up shifts (and how much is locked in illiquid things like home equity).
        </p>
        <StackedAreaChart series={series} horizonYears={horizonYears} assetNames={assetNames} colors={bandColors} milestones={milestones} />
        {/* legend */}
        <div style={{ display: "flex", flexWrap: "wrap", gap: 12, marginTop: 14 }}>
          {assetNames.map((an, idx) => (
            <span key={an.id} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: C.muted }}>
              <span style={{ width: 12, height: 12, borderRadius: 3, background: bandColors[idx % bandColors.length], display: "inline-block" }} />
              {an.name}
            </span>
          ))}
        </div>
      </Card>

      <Card title={`Net worth in ${horizonYears} years`} accent={C.brass}>
        <div className="serif tnum" style={{ fontSize: 38, fontWeight: 700, color: C.forest }}>{fmt(endNW)}</div>
        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginTop: 16 }}>
          <MiniStat label="Today" value={fmt(startNW)} />
          <MiniStat label="Total change" value={fmtSigned(growthTotal)} color={growthTotal >= 0 ? C.green : C.red} />
        </div>
        {/* contributions vs growth */}
        <div style={{ marginTop: 18, paddingTop: 14, borderTop: `1px dashed ${C.line}` }}>
          <div style={{ fontSize: 12, textTransform: "uppercase", letterSpacing: 1, color: C.muted, marginBottom: 10 }}>What built that net worth</div>
          <ContribGrowthBar start={totalStart} contrib={totalContrib} growth={totalGrowth} />
          <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginTop: 12 }}>
            <MiniStat label="Starting assets" value={fmt(totalStart)} />
            <MiniStat label="You contributed" value={fmt(totalContrib)} color={C.moss} />
            <MiniStat label="Market growth" value={fmt(totalGrowth)} color={C.brass} />
          </div>
        </div>
      </Card>

      {/* Per-asset checkpoint breakdown */}
      <Card title="Breakdown by asset" accent={C.moss}>
        <p style={{ color: C.muted, fontSize: 13, marginTop: 0, lineHeight: 1.6, marginBottom: 14 }}>
          Each asset at future checkpoints — so a big total doesn't hide that much of it may be illiquid or lower-risk. The account holding your emergency fund shows its "free" (spendable) balance, with the emergency-fund portion broken out just beneath it, since the fund grows over time to keep pace with your expenses.
        </p>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, minWidth: 360 }}>
            <thead>
              <tr style={{ borderBottom: `2px solid ${C.ink}` }}>
                <th style={{ textAlign: "left", padding: "6px 8px", fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5, color: C.muted }}>Asset</th>
                <th style={{ textAlign: "right", padding: "6px 8px", fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5, color: C.muted }}>Now</th>
                {checkpointRows.map((c) => (
                  <th key={c.y} style={{ textAlign: "right", padding: "6px 8px", fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5, color: C.muted }}>{c.y}y</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {assetNames.map((an, idx) => (
                <React.Fragment key={an.id}>
                  <tr style={{ borderBottom: `1px solid ${C.line}` }}>
                    <td style={{ padding: "7px 8px", display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ width: 10, height: 10, borderRadius: 2, background: bandColors[idx % bandColors.length], display: "inline-block", flexShrink: 0 }} />
                      {an.name}{hasEF && efHolderId === an.id ? <span style={{ fontSize: 11, color: C.muted }}> (free)</span> : null}
                    </td>
                    <td className="tnum" style={{ textAlign: "right", padding: "7px 8px", color: C.muted }}>
                      {fmt(freeAssetValue(startPoint, an.id))}
                    </td>
                    {checkpointRows.map((c) => (
                      <td key={c.y} className="tnum" style={{ textAlign: "right", padding: "7px 8px" }}>
                        {fmt(freeAssetValue(c, an.id))}
                      </td>
                    ))}
                  </tr>
                  {/* emergency fund row, shown right under the account that holds it */}
                  {hasEF && efHolderId === an.id && (
                    <tr style={{ borderBottom: `1px solid ${C.line}` }}>
                      <td style={{ padding: "7px 8px 7px 24px", display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontSize: 12 }}>🛡</span>
                        <span style={{ fontSize: 12, color: C.moss }}>of which emergency fund</span>
                      </td>
                      <td className="tnum" style={{ textAlign: "right", padding: "7px 8px", color: C.moss }}>{fmt(startPoint.efBalance || 0)}</td>
                      {checkpointRows.map((c) => (
                        <td key={c.y} className="tnum" style={{ textAlign: "right", padding: "7px 8px", color: C.moss }}>{fmt(c.efBalance || 0)}</td>
                      ))}
                    </tr>
                  )}
                </React.Fragment>
              ))}
              {/* liabilities row */}
              <tr style={{ borderBottom: `1px solid ${C.line}`, color: C.red }}>
                <td style={{ padding: "7px 8px" }}>Liabilities</td>
                <td className="tnum" style={{ textAlign: "right", padding: "7px 8px" }}>−{fmt(start?.liabilities || 0)}</td>
                {checkpointRows.map((c) => (
                  <td key={c.y} className="tnum" style={{ textAlign: "right", padding: "7px 8px" }}>−{fmt(c.liabilities)}</td>
                ))}
              </tr>
              {/* net worth row */}
              <tr style={{ borderTop: `2px solid ${C.ink}`, fontWeight: 700 }}>
                <td className="serif" style={{ padding: "8px" }}>Net worth</td>
                <td className="tnum" style={{ textAlign: "right", padding: "8px", color: C.forest }}>{fmt(startNW)}</td>
                {checkpointRows.map((c) => (
                  <td key={c.y} className="tnum" style={{ textAlign: "right", padding: "8px", color: C.forest }}>{fmt(c.nw)}</td>
                ))}
              </tr>
            </tbody>
          </table>
        </div>
      </Card>

      {milestones.length > 0 && (
        <Card title="Milestones along the way" accent={C.brass}>
          {milestones.slice().sort((x, y) => x.monthIndex - y.monthIndex).map((m, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.brass, flexShrink: 0 }} />
              <span style={{ flex: 1, fontSize: 14, color: C.ink }}>{m.label}</span>
              <span className="serif" style={{ fontSize: 13, color: C.forest, fontWeight: 600 }}>{monthLabel(m.date)}</span>
            </div>
          ))}
        </Card>
      )}

      <Card title="Assumptions & surplus routing">
        <p style={{ color: C.muted, fontSize: 13, marginTop: 0, lineHeight: 1.6, marginBottom: 16 }}>
          Your monthly surplus is routed through your <strong>Goals</strong> (emergency fund first, then by priority). Once every goal is funded, the leftover flows into the destination below. Per-asset growth rates live on the Net Worth tab.
        </p>
        <label style={{ display: "block", marginBottom: 18 }}>
          <span style={{ fontSize: 14, color: C.ink }}>Where leftover surplus goes</span>
          <select value={overflowId || ""} onChange={(e) => setA("overflowAssetId", e.target.value)}
            style={{ display: "block", marginTop: 6, width: "100%", maxWidth: 280, padding: "9px 12px", borderRadius: 8, border: `1px solid ${C.line}`, background: "#fff", font: "inherit", color: C.ink }}>
            {assetNames.map((an) => <option key={an.id} value={an.id}>{an.name}</option>)}
          </select>
          <span style={{ fontSize: 12, color: C.muted, display: "block", marginTop: 4 }}>Defaults to your highest-growth account ({overflowName}).</span>
        </label>
        <AssumptionSlider label="Time horizon" field="horizonYears" value={horizonYears} min={5} max={40} step={1} suffix=" yrs" setA={setA} />
        <AssumptionSlider label="Annual raise / income growth" field="incomeGrowth" value={a.incomeGrowth != null ? a.incomeGrowth : 3} min={0} max={8} step={0.5} suffix="%" setA={setA} />
        <AssumptionSlider label="Inflation / expense growth" field="expenseGrowth" value={a.expenseGrowth != null ? a.expenseGrowth : 3} min={0} max={8} step={0.5} suffix="%" setA={setA} />
        <p style={{ fontSize: 12, color: C.muted, marginTop: 4, marginBottom: 0, lineHeight: 1.5 }}>
          The emergency fund target grows with your expenses (it's a number of months of spending), so it tops up over time. Cash goals are spent when reached — you'll see net worth dip at those moments. A simplified model with constant rates; treat it as directional, not a guarantee.
        </p>
      </Card>
    </>
  );
}

// Stacked area chart: one band per asset (assets only; liabilities shown as a line)
function StackedAreaChart({ series, horizonYears, assetNames, colors, milestones }) {
  if (!series || series.length < 2) return null;
  const W = 680, H = 300, pL = 70, pR = 16, pT = 16, pB = 36;
  const n = series.length;
  // max stacked asset total
  const maxStack = Math.max(...series.map((s) => s.assets), 1);
  const cx = (i) => pL + (i / (n - 1)) * (W - pL - pR);
  const cy = (v) => pT + (1 - v / maxStack) * (H - pT - pB);

  // Build cumulative band paths (bottom-up)
  const order = assetNames.map((an) => an.id);
  const bands = order.map((id, bandIdx) => {
    const topPts = [], botPts = [];
    for (let i = 0; i < n; i++) {
      const ba = series[i].byAsset;
      let below = 0;
      for (let k = 0; k < bandIdx; k++) { const f = ba.find((x) => x.id === order[k]); below += f ? f.value : 0; }
      const meEntry = ba.find((x) => x.id === id);
      const me = meEntry ? meEntry.value : 0;
      topPts.push([cx(i), cy(below + me)]);
      botPts.push([cx(i), cy(below)]);
    }
    const top = topPts.map((p, i) => `${i === 0 ? "M" : "L"} ${p[0]} ${p[1]}`).join(" ");
    const bot = botPts.slice().reverse().map((p) => `L ${p[0]} ${p[1]}`).join(" ");
    return { d: `${top} ${bot} Z`, color: colors[bandIdx % colors.length] };
  });

  const gridVals = [0, maxStack / 2, maxStack];
  const yearTicks = [];
  for (let y = 0; y <= horizonYears; y += Math.max(1, Math.ceil(horizonYears / 6))) yearTicks.push(y);

  return (
    <div style={{ width: "100%", overflowX: "auto" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", minWidth: 320, display: "block" }}>
        {gridVals.map((gv, i) => (
          <g key={i}>
            <line x1={pL} y1={cy(gv)} x2={W - pR} y2={cy(gv)} stroke={C.line} strokeWidth="1" />
            <text x={pL - 6} y={cy(gv) + 4} textAnchor="end" fontSize="10" fill={C.muted} fontFamily="Georgia, serif">{fmt(gv)}</text>
          </g>
        ))}
        {yearTicks.map((y) => {
          const i = Math.min(n - 1, y * 12);
          return <text key={y} x={cx(i)} y={H - pB + 16} textAnchor="middle" fontSize="10" fill={C.muted} fontFamily="Georgia, serif">{y === 0 ? "now" : `${y}y`}</text>;
        })}
        {bands.map((b, i) => <path key={i} d={b.d} fill={b.color} fillOpacity="0.85" stroke="#fff" strokeWidth="0.5" />)}
        {milestones.map((m, i) => {
          const x = cx(Math.min(n - 1, m.monthIndex));
          return <line key={i} x1={x} y1={pT} x2={x} y2={H - pB} stroke={C.ink} strokeWidth="1" strokeDasharray="2 3" opacity="0.35" />;
        })}
      </svg>
    </div>
  );
}

// Horizontal bar showing starting / contributions / growth proportions
function ContribGrowthBar({ start, contrib, growth }) {
  const total = Math.max(start + contrib + growth, 1);
  const seg = (v, color, label) => (
    v > 0 ? <div title={`${label}: ${fmt(v)}`} style={{ width: `${(v / total) * 100}%`, background: color, height: "100%" }} /> : null
  );
  return (
    <div style={{ display: "flex", height: 18, borderRadius: 9, overflow: "hidden", background: C.paper }}>
      {seg(start, C.muted, "Starting assets")}
      {seg(contrib, C.moss, "You contributed")}
      {seg(growth, C.brass, "Market growth")}
    </div>
  );
}

function MiniStat({ label, value, color }) {
  return (
    <div style={{ flex: "1 1 140px" }}>
      <div style={{ fontSize: 12, textTransform: "uppercase", letterSpacing: 1, color: C.muted }}>{label}</div>
      <div className="serif tnum" style={{ fontSize: 20, fontWeight: 700, color: color || C.ink, marginTop: 4 }}>{value}</div>
    </div>
  );
}

function ProjectionChartRemoved() { return null; }
